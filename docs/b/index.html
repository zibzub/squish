<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MoonCat Squish</title>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="android-chrome" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preload" href="assets/squish.png" as="image">
    <link rel="preload" href="assets/squishy.mp3" as="audio" type="audio/mpeg">
    <link rel="preload" href="assets/unsquish.mp3" as="audio" type="audio/mpeg">
    <link rel="stylesheet" href="squish.css">
  </head>
  <body>
    <main class="page" aria-labelledby="site-title">
      <h1 id="site-title">MoonCat Squish</h1>
      <button class="cat-button" type="button" aria-label="Squish MoonCat">
        <img
          id="mooncat"
          src="assets/mooncat.png"
          alt="MoonCat"
          draggable="false"
        >
      </button>
      <audio id="squishy-sound" src="assets/squishy.mp3" preload="auto"></audio>
      <audio id="unsquish-sound" src="assets/unsquish.mp3" preload="auto"></audio>
    </main>
    <script src="squish.js"></script>
  </body>
</html>
