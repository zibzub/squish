<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MoonCat Squish</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="MoonCat Squish">
    <meta property="og:description" content="Squish MoonCat">
    <meta property="og:url" content="https://squish.zibzub.art/">
    <meta property="og:image" content="https://squish.zibzub.art/assets/preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MoonCat Squish">
    <meta name="twitter:description" content="Squish MoonCat">
    <meta name="twitter:image" content="https://squish.zibzub.art/assets/preview.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="android-chrome" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="preload" href="assets/squish.png" as="image">
    <link rel="stylesheet" href="squish.css">
  </head>
  <body>
    <a
      class="corner-control back-control"
      href="https://zibzub.art/"
      aria-label="Back to zibzub.art"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="m15 18-6-6 6-6"></path>
      </svg>
    </a>

    <button
      class="corner-control sound-toggle"
      type="button"
      aria-label="Turn sound on"
      aria-pressed="false"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <g class="sound-icon sound-icon--on">

          <path d="M4 9v6h4l5 4V5L8 9H4z" />
          <path d="M16 9.5c1 1.4 1 3.6 0 5" />
          <path d="M18.5 7c2 2.8 2 7.2 0 10" />
        </g>
        <g class="sound-icon sound-icon--off">
          <path d="M4 9v6h4l5 4V5L8 9H4z" />
          <path d="M17 9l4 4" />
          <path d="M21 9l-4 4" />
        </g>
      </svg>
    </button>

    <button class="boot-screen" type="button" aria-label="Start MoonCat Squish">
      <img src="assets/boot.png" alt="" draggable="false">
    </button>
    <main class="page" aria-labelledby="site-title">
      <h1 id="site-title">MoonCat Squish</h1>
      <button class="cat-button" type="button" aria-label="Squish MoonCat">
        <img
          id="mooncat"
          src="assets/mooncat.png"
          alt="MoonCat"
          draggable="false"
        >
      </button>
    </main>
    <script src="squish.js"></script>
  </body>
</html>
